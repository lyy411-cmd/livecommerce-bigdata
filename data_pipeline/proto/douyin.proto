// Douyin Live WebSocket Protobuf Schema
// 抖音直播 WebSocket 消息使用 protobuf 编码

syntax = "proto3";
package douyin;

message PushFrame {
    uint64 seqId = 1;
    uint64 logId = 2;
    uint64 service = 3;
    uint64 method = 4;
    repeated HeadersList headersList = 5;
    string payloadEncoding = 6;
    bytes payload = 8;
}

message HeadersList {
    string key = 1;
    string value = 2;
}

message Response {
    repeated Message messagesList = 1;
    string cursor = 2;
    uint64 fetchInterval = 3;
    uint64 now = 4;
    string internalExt = 5;
    uint64 fetchType = 6;
    uint64 heartbeatDuration = 8;
    bool needAck = 9;
    string pushServer = 10;
}

message Message {
    string method = 1;
    bytes payload = 2;
    int64 msgId = 3;
    int32 msgType = 4;
}

message User {
    uint64 id = 1;
    string nickname = 3;
    uint32 level = 6;
}

message ChatMessage {
    bytes common = 1;
    bytes user = 2;
    string content = 3;
}

message GiftMessage {
    bytes common = 1;
    uint64 giftId = 2;
    uint64 repeatCount = 5;
    bytes user = 7;
    bytes gift = 15;
}

message LikeMessage {
    bytes common = 1;
    uint64 count = 2;
    bytes user = 5;
}

message MemberMessage {
    bytes common = 1;
    bytes user = 2;
    uint64 memberCount = 3;
}
